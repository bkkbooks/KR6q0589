body:
  text: 侍者寂乾記録嗣法門人際鋒洪然泓同編住潭州大溈山密印禪寺語録大清康熙三十年秋日師在芙蓉受當寺的峰和尚寧安二邑大護法闔山耆舊兩序諸執請于冬月草七日入院山門三世諸佛從此入歷代祖師從此出且道今日作何行徑顧衆云看腳下萬佛殿殿裏的殿外的四方八面的拈起香云總與一串穿卻韋馱提起具云汝因者件事通身枷鎖我因者件事透體鶻衫若還脫得下大地不能擔拍一拍伽藍一塵不少萬法非剩馬廄牛欄芳規大振喝一喝祖師西天販羊頭東土賣狗肉秖要獲便宜腥臊渾不顧咄慧祖像前拈香虎口蛇鼻鶻眼蝎眉自有者幅面皮後不是愁人即笑人今日不肖到來愁即是笑即是展具云且與遮卻據室踞獅子窟秉金剛劍千聖沒躋攀萬靈絶瞻仰拈拄杖卓一卓即日四衆請開堂拈大梅與老和尚疏陳雲連嶽色旗鼓并天高灼然大人度量點著萬丈洪濤拈護法疏詮上加詮句中破句韓柳歐蘇到此卻步試煩表白高聲念看拈同門疏橫抽玉線直度金針羅文結角交加處鐵額銅頭失卻睛法座以拄杖指云從上諸佛列祖於此方廣座上揚沙簸土打雨敲風山僧到來只好隨條攀例去也便升拈香云此一瓣香如天普蓋似地普擎爇向爐中奉為當今皇帝聖躬萬歲萬歲萬萬歲伏願皇風常浩蕩帝道永清平次拈香云此一瓣香奉為滿朝文武合郡尊官以及在筵紳襟護法伏願恆為盛朝柱石永作佛法金湯復懷中取香云此一瓣香大冶中種就劍刃上攀來收則大地遁藏放則十虛充塞今當第二回拈出爇向爐中專誠供養即此堂上傳臨濟正宗三十四世本師古梅老和尚用酬法乳之恩維那白椎云法筵龍象衆當觀第一義師云達磨面壁屈辱先宗斷臂神光只得一橛山僧今日登祖父堂拏三道五坐一走七個中若有作家禪客便請當陽證據問答不録乃云廣大祖庭宗風浩蕩三玄要旨迥出言詮山僧今日廓開十智門風倒跨三腳驢子直令一會人天見所未見聞所未聞且如何是未見未聞的事卓拄杖云一枝梅破臘萬古恆長春敘謝不録復舉臨濟一日謂普化克符二上座曰我欲于此建立黃檗宗旨汝二人可成褫我二人珍重下去三日後普化卻上來問和尚三日前說甚麼濟便打三日後克符上來問和尚三日前打普化作麼濟亦打師云臨濟與麼建立黃檗宗旨未免自揚家醜克符普化雖則唱拍相資大似逐惡隨邪山僧今日亦欲於此建立先師宗旨仰仗諸人成褫衆中設有個不惜身命底出來掀倒禪床喝散大衆山僧倒退三千里有麼有麼驀拈拄杖卓一卓云若無舉鼎拔山力千里烏騅不易騎復頌曰明投暗合線去絲來龍驤虎驟玉轉珠回全提正令兮千差坐斷倒騎鐵馬兮重關衝開擔板漢休狐猜妙舞不須誇遍拍三臺應是大家維椎云諦觀法王法法王法如是便下座當晚小參德山晚參不答話問話者三十棒今夜溈山放一線道解問者出來一僧才出師云汝不解問僧云爭見某甲不解問師云才動一步白雲萬里又一僧出師云者僧遭點額你又恁麼來僧云恁麼來且置如何是佛法大意師云屎臭氣也吐將來便推開乃云機先一著佛祖罔措才涉毫釐亡羊泣路到者裡真諦俗諦一齊收是聖是凡一時剷所以此事直下如太阿鋒大火聚見則膽怯魂驚觸則喪身失命正恁麼時作麼生與山僧相見卓拄杖云露謝護法上堂妙翅摶羊角大用全彰仙子駕雲龍神機獨露世間世外互成大道場是文是法圓融第一義所以恁麼中不恁麼釋迦滿面是埃塵不恁麼中卻恁麼仲尼全體皆珍御且緇素同途一句作麼生道千峰勢到嶽邊止萬派聲歸海上消請兩序上堂問壯士展臂不資他力和尚出世為甚又需執事師云元首股肱原一體進云喚和尚作兼修得麼師云兼修搬磚弄瓦山僧拈槌豎拂進云未審拈槌豎拂與搬磚弄瓦是同是別師云切忌狐疑進云與麼則賓主聲調諸事泰君臣道合萬邦寧便拜師云賴汝證盟乃拈起杖云你無我不立我無你不成大家出隻手扶起破砂盆卓一卓下座小參召衆云大衆何不散去大溈者裡無你參禪分在饒你以大地作蒲團以十世為工夫時時不動不搖處處築著磕著無異癩馬繫枯樁假能截斷腳下葛藤跳出頂門窠臼竿木隨身逢場作戲也是猿猴無韁鎖直饒總不恁麼如水中月出沒自是他工如鏡中花卷舒不關我事且喜沒交涉所以靈雲睹花夢中作夢香嚴擊竹醉裡添杯神光斷卻臂玄沙築破指割肉醫瘡慧能一聞便了長慶七破始悟燒冰作炭你諸人更來無底桶中討甚麼水到者裡或有個不甘的漢出來問和尚當初如何得與此事相應向他道不遇蒼松柏徒勞話歲寒佛成道日上堂問世尊睹星便悟道和尚睹星時如何師云山僧若睹星一場懡㦬進云昔日世尊今朝和尚師云世尊悟山僧不悟僧便喝師便打僧便拜師大笑乃云抹殺霜空星子刺瞎諸人眼睛天上黑漫漫地下黑漫漫且道悟門在什麼處若向者裡薦得便見世尊當時悟道矢上加尖山僧今日懡㦬空處鑿孔有甚麼奇特所以道會得也三十棒會不得也三十棒明眼難逃落井中雙盲固是扶籬走作麼生得出者兩途去拈拄杖云波斯眼裏迸出火爍破夜叉腦後光與老和尚還大梅上堂大人具大見大智得大用胸中懷六合袖裡挂金錘有時植月中丹桂香光爍破四天下有時推應菴出群楊岐消息振寰中正恁麼時如何稱謝良久云粉骨碎身未足酬一句了然超百億拍禪床下座古老和尚像前上供我被你害你被我敗結怨裹讎成團作塊插香爐中云不如當陽燒卻貴取冰消瓦解除夕末後句今夜是雞尾最初句明朝是狗頭中間一句如何道拍案云斬斷雞尾接起狗頭元旦上堂一僧才出師便打僧云莫是新年令麼師云昨日喫棒的是汝否僧云是師云明日來再與一頓僧云世上盡歌新歲月堂前不改舊家風師便擲下拄杖乃云新年頭行新令一棒一條痕一掌一個印直教人人渾身迸出摩醯眼徹體俱成陷虎坑不用手而擎捉三賢不用口而辨驗十聖一生參學已完百劫受用不盡雖然更須山僧與你脫卻骷髏始得何故漆以堅自割膏以明自焚解制復留衆結春上堂問結制解制即不問不結不解是如何師云沙袋進云今日上堂作麼師以杖撥僧過一邊又問結制解制皆為剩事不結不解總為囈語且置只如臨濟料揀且道料揀何事師云世上病無數醫王藥更多如何是奪人不奪境師云既張陷虎阱獵士盡潛形如何是奪境不奪人師云喝中傾海岱棒下死龍蛇如何是人境兩俱奪師云四海狼煙息將軍不出幃如何是人境俱不奪師云虎嘯風生野龍飛雲滿空人境已蒙師指示向上宗乘是若何師云休尋梅上月莫覓水中天秪者便是否師云何將盤裡豆喚作眼中珠僧便拜師乃卓杖云打破大鐵圍山走出寒山拾得未曾行得一步便要分南分北寒山云你行荒草我深村拾得云君向瀟湘我向秦山僧止之云住住任君踏遍閻浮去依舊青山多緑樹復舉趙州因僧辭話至有佛處不得住無佛處急走過三千里外逢人不得錯舉止師云趙州老漢將恐水中浸殺魚泥裡淹死鰲殊不知有佛處正好唱酬無佛處方堪建立焉得令人錯過雖然秖如大為者裡是有佛處無佛處起座云大衆放下行李好元宵晚參問清宵雷鼓震露地火龍飛如何師云莫驚我瞌睡進云此時如錯過餘夕徒思量師顧侍者云為我將一文錢與他進云與麼則罷聲出嶂塞捲陳赴滄溟去也師云可憐生乃云心燈從地湧慧月白天垂照見象王鼻孔爍開毗盧面門龍潭紙撚子秖堪壁巖頭滿盛油正好滌坑雖然秖如拋出黑漆桶囊藏大地鞭起鐵崑崙逼塞虛空又作麼生遂鼓掌大笑云明暗雙雙好時節小參古人道若以實法與人土也難消所以山僧尋常要你是即是獼猴有一面古鏡釐奴有萬里神光要你非即非十地是擔糞漢三賢是守墓鬼故知相非實相名亦虛名你若認著清風受桎梏明月遭枷鎖若不認著荊棘化優曇羅網成華藏雖然山僧恁麼告報且道是實法不是實法呵呵鴈雖避影卻毛落魚欲潛蹤又水濁縱饒得似德山無檢點何如薦福莫拍香几兩下清明掃塔歸小參適來山僧向百草頭邊掃出一個祖師頭把得歸來與諸人看看遂舉起拳云阿呵呵認錯了原來不是祖師頭是鎮州出的蘿蔔頭佛誕日上堂問靈山有密請牛拔不出少室有真機斧劈不開未審和尚如何師云遍界絶囊藏三冬枯木秀九夏雪花飛如何是未離兜率已降皇宮師云一字兩頭垂荷珠不為露麥浪豈關風如何是未出母胎度人已畢師云乙字兩頭鉤未審世尊恁麼惟是神通妙用惟復法爾如然師云且莫訪佛若不展開滄海水焉能露出珊瑚枝師云三十年後看乃云有水皆涵月無山不帶雲衆生如未有諸佛又何曾大衆即今釋迦老子在你頂𩕳上降誕眼睛裡成道鼻孔中建道場舌尖上演妙法你諸人還知也未若也知得切忌轉腦旋眸鼓氣搖唇觸犯如來念頭無人為汝懺悔其或不知快自取下頭來看看連喝兩喝下座解春值常住散扇供衆上堂青陽才去朱夏又臨鐵蛇口裡吐火石虎頭上噴金直得閻浮提頓成爐炭香水海化作𤐰湯到者個時節野狐精水牯牛三腳驢一齊燒殺麻三斤柏樹子乾矢橛當下灰生更有甚葛藤難掃鬼眼難覷一任諸人無憂無慮撒風撒顛大似門前泥力士不將一事挂心田雖然要且諸人即今骨節中大發毛孔裡煙生又作麼生支遣頭院主云好為大衆過犀牛扇子來上堂拈拄杖云一塵一個金剛圈一物一塵栗棘蘿卓一卓云到者裡無你轉身時亦無你下口處所以你若會得靈龜依舊滯沙泥你若不會頑石何曾能𨁝跳你若會中有不會是甚麼鳥啼非有意花笑本無心你若不會中有會是甚麼石磨分粗細稱錘知重輕所以道有手只好拏空有口秖堪挂壁有一等孟八郎向跳不得處去跳吞不得處去吞無異蝸牛鬥石壁蚊子鑽鐵牛殊不知通玄不待往契妙豈須餐你若直下絶追尋當處忘計較管取金剛圈驀地斷了栗棘蓬和根倒卻諸仁者委悉麼折角泥牛忘百草沒蹄石馬斷千岐天中節小參盡大地是個病人三世諸佛轉妙法輪伸患不了歷代祖師傳正法藏叫苦不息一切衲僧發大道心忍痛不徹乃至群生萬有有情者顛狂不消無情者癰疽未解山僧今日要與一齊醫了良久云時逢五月五何物不醍醐祈雨上堂問山川涸竭禾麥萎然和尚將何法濟人師便連打數棒進云恁麼又豈能濟人師云且喜棒如雨點進云可謂頭頭總三昧物物悉醍醐師云浸破汝腦門僧便作禮師大笑乃拈拂子云把住十虛路塞卻四海源黃龍困殺機關雲門抬頭不起直得嘉州大象眼裡流淚陝府鐵牛皮下無血拂一拂云山僧今日放開一線貴使無滲漏處傾湫倒嶽至枯稿地浪湧波騰灑腐草為嘉禾潤糠秕成玉粒堪行不濟之恩用助無為之化且法雨普滋一句作麼生道家家歌歲稔個個樂升平立秋上堂揮拂子云殺不用刀割不須鑿一毫才變顏萬物盡銷鑠千山脫皮換毛萬木解粘去縛正恁麼時如何四方八面絶遮攔萬里天邊飛隻鶚小參要說時須彌塞咽喉也塞不住不說時風輪拔舌頭也拔不出且道利害在甚麼處待你折倒須彌斬斷風輪來向你道中秋值雲掩月晚參以手指云明歷歷光凜凜飛過萬山頭不動一莖草穿入千江底不沾一滴水雖然奇則也奇要且你通身環個銀圈還出得麼透心個鐵橛還拔得麼所以亙古亙今秖成得一色邊山僧今夜要與你拈卻顧侍者云與我過燈籠結冬上堂遍大千沙界是個選佛場盡十世古今無非參禪日你諸人未出門時早已結制了也更要山僧今日為你捏緊布袋頭大似木中著楔秪成一場多事雖然結卻髑髏要坐不能坐要行不能行許諸人有分結卻性命要生不得生要死不得死許諸人有分爭奈未得出身路在豎拂子云大衆還會麼若也會得不妨向針不容芥上七縱八橫隙不通風處轟雷掣電其或未然從前謾負真金譽今日重新火裡看上堂侍者問昔日香嚴上堂因僧問不求諸聖不重己靈時如何嚴曰萬機休罷千聖不攜意旨若何師云樓因山勢峻船逐浪頭高云時疏山在衆作嘔聲曰是何言歟真是不肯嚴否師云上山攀墜石不顧自亡腓云嚴聞下座曰適對此僧語必有不是致招師叔如是未審過在甚麼處莫是受山惑麼師云帶月沖霄去和煙跌地來云疏山曰萬機休罷猶有物在千聖不攜亦從人得如何無過恁麼果是嚴過否師云有石方生玉無沙不見金云香嚴曰卻請師叔道乃禮拜躡前問果有疑而問麼師云若不拋死蝦如何釣跛鱉云疏山曰何不道肯諾不得全惟是答他問處復是別有商量師云秖因一菜落露出五湖秋云因何嚴又問肯又肯個甚麼諾又諾于阿誰師云鑽瓦須流血敲冰必見煙云疏山曰肯即肯他千聖諾即諾于己靈與不求諸聖不重己靈相去多少師云孰謂野狐皮亦自有人著云嚴又道師叔恁麼道向後倒屙三十年莫是罵他麼師云本是秦宮調卻作楚詞傳云向後山果病每于食後抉口吐曰香嚴記我三十年倒屙尚缺三年在果是遭他授記否師云誰知昔時烏卻成今日馬云如今學人敢問和尚不求諸聖不重己靈又作麼生師云放下問頭來向你道者便休去師云如是乃云古人道實際理地不受一塵萬行門中不捨一法須是過量人方可隨處作主遇緣即宗要見香嚴麼雞不下水要見疏山麼魚不上樹且道二大老還有優劣也無雲收雨霽長空闊一對鴛鴦畫不成起七落堂晚參一僧出衆叉手而立師便打僧云將謂將謂原來原來便歸衆師隨後又打又一僧才出便云還我棒頭來師不顧僧云且喜某甲血濺梵天了也師亦不顧維那出衆云和尚何得傷龜恕鱉師云錯見山僧在那云未審師意如何師云將龜釣鱉那便休去師大笑乃云坐坐蒲團兒羅文結角等閒矣破脊梁上一場懡㦬行行芒鞋子百結千層驀地踏翻腳跟下甚可憐生既然如是又用者場特地作麼不因虞泉暗爭見扶桑曉解七落堂小參師才就椅不覺噴嚏遂命衆下語有道且喜和尚鼻孔通一線有道正恁麼時還塞得住麼有道仲冬嚴寒和尚宜保護有道恭賀和尚拄杖子今冬必然解懷有道笑倒露柱有道侍者師捃取三十年後大有用去在師呵呵大笑云誰知山僧一個噴嚏打出多少獅子兒來乃云虀甕裡水流風動布袋頭地闊天高自是汝諸人腳跟下葛藤未斷頂𩕳上窠臼未翻不免向赤灑灑地如魚在網似鳥棲籠出入不得自由縱橫豈能自在山僧今日秉金剛寶劍握無孔鐵槌為諸人斬斷葛藤打破窠臼去也遂掀倒香案出堂小參猛虎頷下有珍珠無人敢取毒蛇口裡有瓊漿無人敢舐若是大丈夫不難拾取性命根挂于劍刃上把將皮袋子拋向毒鼓中到恁麼脫體無依的田地方堪橫行三界混入四生不用一莖草現百億法身不假一粒粟建無量法幢直令斷井索成鳳成龍死蝦蟆吞佛吞祖為人所不能為示人所不能示且獨步高超一句作麼生道出頭天外看誰是我般人說戒上堂問一念不生萬緣放下且道戒個甚麼師云汝寒來著衣饑來喫飯麼進云然師云何曾放下進云也知和尚不著衣喫飯師云切忌犯口業進云還許學人懺悔也無師云直須無口始得進云恁麼則和尚亦犯口業師云為憐三歲子不惜兩莖眉僧作禮師乃云有戒可受蜘蛛網裡坐無戒可受猢猻樹上走若是個漢直須折倒枯木寒巖不向此中依倚踢翻花街柳巷別作一番行徑然後即頭頂文殊足踏普賢手抱釋迦口噬彌勒無非圓本有之風光顯當人之作用諸仁者還會麼若也會得不妨當陽擊碎鉢盂燎卻袈裟歸家去脫或未然不免帶纍山僧舌頭落地誕日兩序請上堂問祝讚壽誕即且置王子五位請師宣師云逐一問將來如何是誕生王子師云聲容全不動萬國咸尊威如何是朝生王子師云高明逾日月指顧定乾坤如何是末生王子師云十年修素志一日步丹霄如何是化生王子師云隨時敷政令在處振權衡如何是內生王子師云九重深處坐不許衆臣知如何是五位王子父師云威音不識面如何是五位王子子師云樓至不知名未審和尚是那一位師云荒草不堪宿瓊樓亦不居原來和尚是者一位師云他後見人切忌道親見山僧來僧云諾便入衆師乃以手自指云山僧自有者個來被伊帶纍眼是黑漆桶破他不得耳是招箭垛取他不得口是大禍門閉他不得秖有眉橫鼻直足以扶豎宗乘山僧賴伊提持不少乃高聲叫云大衆會麼遍體無非關捩子今朝拈出與人看安邑侯趙公送金額至上堂祖庭法印又重提赫赫光輝日月齊大福士修大福事個中人諳個中機因事值雪晴上堂昨夜風穴昭呼號大怒驚起雲居膺勃然變色引出雪巖欽乘機弄巧為妖作怪打大地作一團結江湖成一片南山鱉鼻換骨解皮大雄猛虎潛牙縮爪山僧今辰不忍坐觀成敗急命太陽玄出來作個解交以手指云一輪光烜赫萬象悉回春元旦上堂日日是好日年年是好年不披三玄甲胄不彈五位弓弦端拱垂裳清宇宙鳳簫吹徹御樓前立春上堂問昨朝歌白雪今日賦陽春如何是臘去春回句師云免教寒殺闍黎進云欲識佛性義當觀時節因緣扺如今日立春如何是佛性義師云梅花落未盡柳葉長將來進云只好道不關時法因境蔽又作麼生師云貌醜休嫌鏡病深莫怨醫僧便喝師大笑僧禮拜師便打乃云白雪築長空寒冰裹大地障蔽靈山的旨埋沒少林消息山僧今日要與掃開白雪露出春王面孔劈破寒冰漏泄化母機關貴使龍吟枯木石筍抽條鶯聲長燕聲短咸談般若桃花紅李花白悉顯真如且法逐時彰一句作麼生道顧衆云若能識此日何物非韶光解制上堂鐵壁銀山一腳踏倒金鎖玄路就手掣開便可一步一須彌一蹴一佛土趙州覓影無方寶掌追蹤無計雖然也是蝦跳不出斗大悲誕日上堂拈起杖云觀世音生也汝諸人還見麼若也見得石堆土壘無非爍迦羅眼尺木寸草莫非母陀羅臂驢蹄馬跡俱是清淨寶目雞啼犬吠總是圓通妙音具廣大智慧顯最勝神通不勞彈指教化一切衆生無用揚眉收攝一切魔屬若也不見莫道菩薩入滅度去也遂擲下拄杖下座晚參上無瞻仰頂門自是朝天下絶追尋腳跟何曾離地所以情塵未盡旃檀成荊棘之林識見若忘瓦樂變黃金之色雖然北猶是死水藏龍邊事若是越量超群漢直須來光潔地上帶水拖泥解脫場中披枷著杻于無為中運為無法中演法挂破笠子于壁上蓋覆梵天置爛草鞋于路邊踏倒閻浮方不孤負自己埋沒先宗若到大溈者裡更須朝打三千暮打八百為甚麼聻幸爾無瘡何須刳肉佛誕日值學祖生辰上堂描不成畫不就一對鴛鴦交頸宿三百六十餘會偷心未滿二年共一春狼謀卻足一會天人事儼然說甚西天與東土拍禪床下座天中節小參青山如浪湧萬木若船搖禪人高著眼看取最高標拈起杖云若能赤手奪去管取一世豐饒其或四顧躊躇貪觀天上月失卻手中橈上堂一塵未起大地全彰一毫未收虛空消殞是諸人現成事秖如蝸牛角上飛出金翅鳥王蟭螟眼裡跳出金毛獅子拈起須彌山穿卻釋迦鼻把得香水海灌破毗盧頂是現成不是現成喝一喝云莫寐語中秋晚參二十年前事拈出實不堪欲將拋向後覿面成熱瞞乃以手指云諸仁者著眼看十方無向背四面絶遮攔明明一著超群有說甚前三與後三開爐上堂大開爐韝鎔瓶盤叉釧為一金大展鉗錘化鈍銻頑銅為一器八兩還你半斤十成謾誇足色勸君莫認定盤星須防大匠把金貼卓拄杖下座上堂見色明心聞聲悟道毒蛇穿你眼耳逢緣不起觸境無知鐵橛釘汝肝膈直饒無迷無悟絶是絶非如枯木糝花寒灰發焰成得什麼事所以道恁麼也不得不恁麼也不得恁麼不恁麼總不得然則畢竟如何手執夜明符幾個知天曉小參山僧一向不肯人撿點將來未免壓良為賤自今不如改換旗鎗去也他後山僧若有問你即咳聲嗽道你是獅子吼時芳草緑你即掉下頭道你是象王回顧落花紅假使全然不動向你道一塵若不起萬法自然彰全然不語亦向道迥超四句外不落百非中山僧恁麼告報你諸人還信得及也未若信得及許你直下承當若信不及許你不受顢頇所以道等閒識得東風面萬紫千紅總是春雖然此猶是空口談玄更須當面取證遂搊住侍者云離卻語默動靜道將一句來者無對師呵呵大笑云龍生金鳳子衝破碧琉璃將說戒先夜晚參諸人莫求授戒麼逢佛殺佛逢祖殺祖是大宗匠境界燒金剛鈔謗涅槃經是大智慧人境界驅耕夫牛奪饑人食是大手眼人境界笑入淫房橫眠酒肆是大解脫人境界乃至粗言并細語皆歸第一義直行與曲行咸入不二門你諸人更戒個甚麼說到者裡或有個漢出來道和尚恁麼說話秖知教人直下擔荷未知教人向上行履在山僧向伊道若論向上行履且待明日為汝道破示衆我者裡禪如矢上一鉤相似逢高則射遇深則釣汝等諸人作麼生回避示衆砒礵石是生性命母醍醐瓶是煮髑髏鐺沖霄路是金繩鐵鎖陷虎坑是玉殿瓊樓若人透此四轉語方得左右歸源縱橫合轍鍛煉佛祖開鑿人天若透不得管取雞因畏水終難變鳥為貪風反致烹示衆參禪人恰如夢裡尋歸路不知身本在家眠還覺麼拍香几一下上堂泰山石敢當街頭巷尾坐有眼不識伊無眼較一半那一半十影神駒夜度江八角磨盤空裡墜卓拄杖下座示衆山僧蒞衆三年若非耕田耰土定是弄瓦搬磚諸人未了事從未決斷太煞孤負今日不免結案去也乃橫按拄杖云馬師一即一非大梅一親一疏趙州一有一無法眼一得一失狐言魅語百丈野狐雲巖獅子南山鱉鼻東海鯉魚為妖作怪女子燒菴南泉斬貓婆子拋兒孚公折箭壓良為賤婦人分娩院主墮眉德山化去疏山倒屙掩耳偷鈴石頭恁麼也不得不恁麼也不得祕魔道得也叉下死道不得也又下死普化明來明打暗來暗打普州人捉賊善慧空手把鉏頭步行騎水牛人從橋上過橋流水不流法順懷州牛喫禾益州馬腹脹天下覓醫人炙豬左膞上高峰海底泥牛銜月走巖前石虎抱兒眠鐵蛇鑽入金剛眼崑崙騎象鷺鷥牽開了眼作夢以上數案總是者夥多知漢不守本分無事生事帶纍諸人無有了日山僧開張毒口一時為諸人判斷了也諸人正好放下疑團歸家穩坐一任饑來喫飯倦時打眠更有什麼事所以道只今休去便休去更待了時到幾時時有僧問云諸老淆訛既承和尚判斷秖如威音那畔事又作麼生師云今日不著便遂擲杖歸方丈
