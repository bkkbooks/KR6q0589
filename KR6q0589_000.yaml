front:
  text: 敘大溈山周百四十里嶺壑幽深草木蓊鬱楚南靈境也開自唐時靈祐老祖明季五峰和尚得法天童重闢興焉傳迄古梅天翼父子愈熾愈昌為臨濟下正傳第三十四五世也子姪笑穎鋒公韶齡讀書鄉孰穎異邁衆於舉子業下筆翻江有大成之望一旦書密札置書案硯下一謝其師一白父母飄然不知所往比得札四路偵尋杳無蹤跡數年後訪知剃髮大溈為天公入室高弟識見超脫機辨莫敢櫻其鋒者父兄強之不歸頃且繼住二師舊所托跡芙蓉山今春以父喪歸里持其師語録示余且索余敘余宿不善談禪然契其宗旨爰取而靜玩之機鋒迅截慧眼圓明如旱地崩雷如晴空掣電如走盤珠如摩尼寶精光閃爍著著全提可謂一切處不留一切處成就者也是知開繼分殊源流則一所謂月印萬川川川皆月因指見月非月即指者只可意會未易言詮誠有離乎象數筌蹄之跡而遊乎希夷渾沕之表者矣昔韓昌黎指斥二氏而於潮陽大顛稱其能外形骸以理自勝不為物亂中無滯礙與之往來周旋豈非以儒釋分合會通不遠若柳柳州取喻如石韞玉未可因外遺中有同心也耶又況天師見地超越更出韓柳所遇什伯懸殊者乎數語以應笑穎之請時康熙甲申季春月之朔花源八十五叟紫蘿羅人琮撰於最古園之學圃亭序昔古梅和尚脫縫掖披緇以其家重大事盡付之諸季掉臂直入千峰萬峰蓋目籠三界體合萬殊其不以法胤之替隆為情量可知也雖然吾於天翼禪師有以觀古公之不替焉公初與大梅與公首佐溈開濟赫著宗猷海內叢林望密印父子兄弟間巋然古大溈也其後英髦輩起披衣者驟至七葉環雁行駢輝競耀而公之門落落焉或曰公繼主溈席遷芙蓉所鎔鍊人才宜不少俊傑而寂寞乃爾疑蓉流斷續將如何矣夫孰知公之揀辨實嚴待發於翼禪師者奇特爛熳不可以目睫睹歟翼師三歲出塵純乎天葆受業後即遍參知識穎脫驚人諸方異之不啻羅龍罻鳳師翱翔無所顧一旦高叩芙蓉片言納贄如送自天風此豈恆情所可測耶及隨古公出山至白下重新鍵戶七百餘日乃大笑破關推古公倒地公起喜曰吾事自今差畢真一夔足矣其潛密如此則又豈恆情所可測耶師嗣主芙蓉甫一年而大溈虛席緇素敦迎入繼遂兼荷兩山韶才粹德浩應無方遠邇英俊之士聞椎拂所作飆赴雲臻才更冬夏兩制衆中嶄然見頭角者遽淂四人先後記莂彪炳一堂當此之時古公門庭可不謂光大歟於是兩山法録映被諸方皪然昭作述之盛今按其聲節宛見古公典型而激之以曼拔導之以近專妙顯綱宗有響無跡所謂後出者愈奇非耶嗚呼此古公所以晚淂賢嗣擇乳真而傳器慎之效也亦何疑繼起之爪牙龍象不接武崢嶸也哉嗣法中今主芙蓉藏菴大師既丐其在家諸父紫蘿侍御公為撰辨言評唱之擬於雷霆星漢無以加矣而又屬豫更贅蕪詞者謂豫與古公世出世間並有深誼其佐溈堂構本末豫身與之使說家裏話頗可傳信是以不辭鄙陋一申言之亦欲為紛紛七葉中名實相應與否者示法門鄭重事理終不容謬有如此云康熙甲申仲冬朔日石溪老學人陶之典撰
